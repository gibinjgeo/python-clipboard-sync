name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time; a new push cancels any in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Only ship the files the browser actually needs
      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          cp supabase_setup.sql _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
